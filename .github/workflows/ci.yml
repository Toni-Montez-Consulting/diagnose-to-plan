name: DTP CI

on:
  push:
    branches: [main, v2/harness]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dtp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Python and Practice OS gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest

      - name: Lint
        run: python -m ruff check .

      - name: Validate draft skills
        run: python -m dtp skills --validate

      - name: Practice OS doctor
        run: python -m dtp practice doctor
