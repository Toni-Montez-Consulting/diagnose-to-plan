name: DTP CI

on:
  push:
    branches: [main, v2/harness]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dtp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Python and Practice OS gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Prepare CI fixture workspace
        run: |
          mkdir -p inputs ../../consulting ../../hub
          cat > inputs/fixture-diagnose.md <<'EOF'
          # Fixture Diagnose Note

          Client runs a local service business with scattered intake, manual follow-up, and no reliable handoff record.

          The first useful move is to map the intake path, identify the owner bottleneck, and draft a small operating-system install that improves lead handling without creating another dashboard to maintain.
          EOF

      - name: Test
        run: python -m pytest

      - name: Lint
        run: python -m ruff check .

      - name: Validate draft skills
        run: python -m dtp skills --validate

      - name: Practice OS doctor
        run: python -m dtp practice doctor
