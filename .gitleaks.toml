title = "diagnose-to-plan secret scanning"

[[allowlists]]
description = "Generated local environment, cache, and build artifacts"
paths = [
  '''(^|[\\/])\.venv[\\/]''',
  '''(^|[\\/])__pycache__[\\/]''',
  '''(^|[\\/])\.pytest_cache[\\/]''',
  '''(^|[\\/])\.ruff_cache[\\/]''',
  '''(^|[\\/])\.mypy_cache[\\/]''',
  '''(^|[\\/])dist[\\/]''',
  '''(^|[\\/])build[\\/]''',
  '''(^|[\\/])\.env$''',
  '''(^|[\\/])\.env\.local$''',
  '''(^|[\\/])\.env\.[^.]+\.local$''',
]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-[A-Za-z0-9_-]+'''
tags = ["key", "anthropic"]

[[rules]]
id = "aws-access-key"
description = "AWS access key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["key", "aws"]

[[rules]]
id = "private-key"
description = "Private key block"
regex = '''-----BEGIN [A-Z ]*PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "github-token"
description = "GitHub token"
regex = '''gh[pousr]_[A-Za-z0-9_]{36,255}'''
tags = ["key", "github"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-(proj-[A-Za-z0-9_-]{20,}|[A-Za-z0-9]{20,})'''
tags = ["key", "openai"]

[[rules]]
id = "stripe-api-key"
description = "Stripe API key"
regex = '''[prsk]k_(live|test)_[A-Za-z0-9]{16,}'''
tags = ["key", "stripe"]

[[rules]]
id = "generic-secret-assignment"
description = "Generic assignment-style secret"
regex = '''(?i)(?:api[_-]?key|secret|token|password)[ \t]*[:=][ \t]*['"]?([A-Za-z0-9_./+=-]{20,})'''
secretGroup = 1
tags = ["key", "generic"]

[[allowlists]]
description = "Intentional fake keys used to test extraction and redaction behavior"
condition = "AND"
paths = [
  '''tests/test_extract_detector\.py''',
  '''tests/test_redact\.py''',
]
regexes = [
  '''sk-ant-api03-secret''',
  '''sk-ant-1234567890abcdef''',
]
